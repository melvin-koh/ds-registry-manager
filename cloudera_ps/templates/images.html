{% extends "base.html" %}

{% block title %}Images — Embedded Registry Image Manager{% endblock %}

{% block content %}
<section class="card">
    <div class="card-header">
        <h2>Registry Images</h2>
        <button class="btn btn-secondary" id="refresh-btn" onclick="startRefresh()">Refresh</button>
      </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" style="
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 3rem 1rem; gap: 1rem;">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none"
         xmlns="http://www.w3.org/2000/svg"
         style="animation: spin 1s linear infinite;">
      <circle cx="24" cy="24" r="20" stroke="#e0e0e0" stroke-width="4"/>
      <path d="M44 24a20 20 0 0 0-20-20" stroke="#F96702" stroke-width="4"
            stroke-linecap="round"/>
    </svg>
    <p id="loading-status" style="color:#555; font-size:0.95rem; margin:0;">
      Connecting to registry…
    </p>
    <div style="width:320px; background:#e0e0e0; border-radius:4px; height:8px; overflow:hidden;">
      <div id="progress-bar"
           style="height:100%; width:0; background:#F96702;
                  border-radius:4px; transition:width 0.2s ease;"></div>
    </div>
    <p id="progress-label" style="color:#888; font-size:0.85rem; margin:0;">0 / 0 images</p>
  </div>

  <!-- Results (hidden until load completes) -->
  <div id="results-area" style="display:none;">
    <p class="help-text" id="summary-text"></p>
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Image Path</th>
            <th>Tag Count</th>
            <th>Latest Tag</th>
          </tr>
        </thead>
        <tbody id="image-tbody"></tbody>
      </table>
    </div>
    <nav class="pagination" id="pagination-nav" aria-label="Image list pagination"></nav>
  </div>

  <!-- Error area -->
  <div id="error-area" style="display:none;">
    <p class="empty-state" id="error-text" style="color:#c0392b; padding:2rem;"></p>
  </div>
</section>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<div id="page-config" data-per-page="{{ images_per_page }}" style="display:none;"></div>

<script>
const PER_PAGE = parseInt(document.getElementById('page-config').dataset.perPage, 10);
let allRows = [];
let currentPage = 1;

function startStream(url) {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('error-area').style.display = 'none';
  document.getElementById('loading-status').textContent = 'Connecting to registry…';
  document.getElementById('progress-bar').style.width = '0';
  document.getElementById('progress-label').textContent = '0 / 0 images';

  const src = new EventSource(url);
  src.onmessage = handleMessage.bind(src);
  src.onerror = function() {
    src.close();
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-area').style.display = '';
    document.getElementById('error-text').textContent =
      'Connection to registry stream lost. Please refresh.';
  };
  return src;
}

function startRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Refreshing…';
  if (window._activeSource) { window._activeSource.close(); }
  window._activeSource = startStream("{{ url_for('api_refresh') }}");
  window._activeSource.addEventListener('message', function(e) {
    const msg = JSON.parse(e.data);
    if (msg.type === 'complete' || msg.type === 'error') {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  });
}

function renderPage(page) {
  currentPage = page;
  const total = allRows.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  page = Math.max(1, Math.min(page, totalPages));
  const start = (page - 1) * PER_PAGE;
  const slice = allRows.slice(start, start + PER_PAGE);

  const tbody = document.getElementById('image-tbody');
  tbody.innerHTML = slice.map(r => `
    <tr>
      <td class="mono">${escHtml(r.image)}</td>
      <td>${r.tag_count}</td>
      <td class="mono">${escHtml(r.latest_tag)}</td>
    </tr>`).join('');

  document.getElementById('summary-text').textContent =
    `Showing ${slice.length} of ${total} image(s). Sorted alphabetically by full path.`;

  // Pagination
  const nav = document.getElementById('pagination-nav');
  if (totalPages <= 1) { nav.style.display = 'none'; return; }
  nav.style.display = '';
  let html = page > 1
    ? `<a class="page-link" href="#" onclick="renderPage(${page-1});return false;">&laquo; Prev</a>`
    : `<span class="page-link disabled">&laquo; Prev</span>`;
  for (let p = 1; p <= totalPages; p++) {
    html += p === page
      ? `<span class="page-link current">${p}</span>`
      : `<a class="page-link" href="#" onclick="renderPage(${p});return false;">${p}</a>`;
  }
  html += page < totalPages
    ? `<a class="page-link" href="#" onclick="renderPage(${page+1});return false;">Next &raquo;</a>`
    : `<span class="page-link disabled">Next &raquo;</span>`;
  nav.innerHTML = html;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function handleMessage(e) {
  const src = this;
  const msg = JSON.parse(e.data);

  if (msg.type === 'total') {
    document.getElementById('loading-status').textContent =
      `Loading ${msg.total} image(s)…`;
    document.getElementById('progress-label').textContent =
      `0 / ${msg.total} images`;
  }
  else if (msg.type === 'progress') {
    const pct = msg.total > 0 ? (msg.done / msg.total * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('loading-status').textContent =
      `Loading: ${msg.image}`;
    document.getElementById('progress-label').textContent =
      `${msg.done} / ${msg.total} images`;
  }
  else if (msg.type === 'complete') {
    src.close();
    allRows = msg.rows;
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('results-area').style.display = '';
    if (allRows.length === 0) {
      document.getElementById('image-tbody').innerHTML =
        '<tr><td colspan="3" class="empty-state">No images found in the registry.</td></tr>';
    } else {
      renderPage(1);
    }
  }
  else if (msg.type === 'error') {
    src.close();
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-area').style.display = '';
    document.getElementById('error-text').textContent =
      'Unable to load images: ' + msg.message;
  }
}

// Initial page load
window._activeSource = startStream("{{ url_for('api_load_images') }}");
</script>

{% endblock %}
