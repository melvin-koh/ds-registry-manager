{% extends "base.html" %}

{% block title %}{{ image_path }} — Embedded Registry Image Manager{% endblock %}

{% block content %}
<section class="card">
  <div class="card-header">
    <div>
      <a href="{{ url_for('images') }}" class="back-link">← Back to Images</a>
      <h2 class="mono" style="margin-bottom:0; margin-top:0.35rem; word-break:break-all;">{{ image_path }}</h2>
    </div>
  </div>

  <!-- Loading state -->
  <div id="loading-overlay" style="display:flex; flex-direction:column; align-items:center;
       justify-content:center; padding:3rem 1rem; gap:1rem;">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none"
         xmlns="http://www.w3.org/2000/svg"
         style="animation: spin 1s linear infinite;">
      <circle cx="24" cy="24" r="20" stroke="#e0e0e0" stroke-width="4"/>
      <path d="M44 24a20 20 0 0 0-20-20" stroke="#F96702" stroke-width="4"
            stroke-linecap="round"/>
    </svg>
    <p style="color:#555; font-size:0.95rem; margin:0;">Fetching tag details…</p>
  </div>

  <!-- Results -->
  <div id="results-area" style="display:none;">
    <div class="results-toolbar">
      <p class="help-text" id="summary-text"></p>
      <div class="card-header-actions">
        <button class="btn btn-secondary" id="refresh-btn" type="button">Refresh</button>
        <button class="btn btn-secondary" id="delete-btn" type="button">Delete</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th class="checkbox-col"><input type="checkbox" id="select-all-tags" aria-label="Select all tags"></th>
            <th>Tag</th>
            <th>Digest</th>
            <th>Architecture</th>
            <th>OS</th>
            <th>Created</th>
            <th>Compressed Size</th>
          </tr>
        </thead>
        <tbody id="detail-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Error state -->
  <div id="error-area" style="display:none;">
    <p class="empty-state" id="error-text" style="color:#c0392b; padding:2rem;"></p>
  </div>
</section>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
.back-link {
  color: var(--cloudera-orange);
  text-decoration: none;
  font-size: 0.9rem;
}
.back-link:hover { text-decoration: underline; }
.digest-cell {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 0.8rem;
  word-break: break-all;
  max-width: 260px;
  color: var(--text-muted);
}
</style>

<script>
const IMAGE_PATH = {{ image_path | tojson }};

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const GC_MESSAGE =
  'Disk space will only be reclaimed after the registry runs garbage collection.';

function renderTagTable(tags) {
  document.getElementById('summary-text').textContent =
    `${tags.length} tag(s) found for this image.`;

  const tbody = document.getElementById('detail-tbody');
  if (tags.length === 0) {
    tbody.innerHTML =
      '<tr><td colspan="7" class="empty-state">No tags found for this image.</td></tr>';
    document.getElementById('select-all-tags').checked = false;
    return;
  }

  tbody.innerHTML = tags.map(t => `
    <tr>
      <td class="checkbox-col"><input type="checkbox" class="tag-select" value="${escHtml(t.tag)}" aria-label="Select tag ${escHtml(t.tag)}"></td>
      <td class="mono">${escHtml(t.tag)}</td>
      <td class="digest-cell">${escHtml(t.digest || '—')}</td>
      <td>${escHtml(t.architecture || '—')}</td>
      <td>${escHtml(t.os || '—')}</td>
      <td>${escHtml(t.created || '—')}</td>
      <td>${escHtml(t.total_size || '—')}</td>
    </tr>`).join('');

  const selectAll = document.getElementById('select-all-tags');
  selectAll.checked = false;
  selectAll.onchange = function() {
    document.querySelectorAll('.tag-select').forEach(cb => { cb.checked = selectAll.checked; });
  };
}

function loadTagDetails() {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('error-area').style.display = 'none';

  return fetch(`/api/image-detail?image=${encodeURIComponent(IMAGE_PATH)}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading-overlay').style.display = 'none';

      if (data.error) {
        document.getElementById('error-area').style.display = '';
        document.getElementById('error-text').textContent = 'Error: ' + data.error;
        return;
      }

      renderTagTable(data.tags || []);
      document.getElementById('results-area').style.display = '';
    })
    .catch(err => {
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('error-area').style.display = '';
      document.getElementById('error-text').textContent =
        'Failed to load image details: ' + err.message;
    });
}

async function refreshTagDetails() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Refreshing…';
  try {
    await loadTagDetails();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

async function deleteSelectedTags() {
  const selected = [...document.querySelectorAll('.tag-select:checked')].map(cb => cb.value);
  if (selected.length === 0) {
    alert('Please select at least one tag to delete.');
    return;
  }

  const confirmMsg =
    `Are you sure you want to delete the following tag(s) from ${IMAGE_PATH}?\n\n` +
    selected.map(tag => `• ${tag}`).join('\n') +
    `\n\nThis action cannot be undone.`;
  if (!confirm(confirmMsg)) return;

  const btn = document.getElementById('delete-btn');
  btn.disabled = true;
  btn.textContent = 'Deleting…';

  try {
    const resp = await fetch("{{ url_for('api_delete_images') }}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: selected.map(tag => ({ image: IMAGE_PATH, tag })),
      }),
    });
    const data = await resp.json();

    if (data.deleted && data.deleted.length > 0) {
      let successMsg =
        `Successfully deleted:\n\n${data.deleted.map(item => `• ${item}`).join('\n')}\n\n${GC_MESSAGE}`;
      if (data.errors && data.errors.length > 0) {
        successMsg +=
          `\n\nSome deletions failed:\n` +
          data.errors.map(e => `• ${e.item}: ${e.error}`).join('\n');
      }
      alert(successMsg);
      await loadTagDetails();
    } else {
      const errDetail = data.errors && data.errors.length
        ? data.errors.map(e => `• ${e.item}: ${e.error}`).join('\n')
        : (data.error || 'Unknown error');
      alert(`Delete failed:\n\n${errDetail}`);
    }
  } catch (err) {
    alert('Delete failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

document.getElementById('refresh-btn').addEventListener('click', refreshTagDetails);
document.getElementById('delete-btn').addEventListener('click', deleteSelectedTags);
loadTagDetails();
</script>
{% endblock %}
